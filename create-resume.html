<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Resume - ResumeCraft</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
    <!-- Quill.js CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>

    <!-- Animated Background -->
    <div class="area">
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" style="display: flex; align-items: center;">
                <img src="img/logo4.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                ResumeCraft
            </a>
            <div class="d-flex align-items-center">
                <div class="theme-switch-wrapper me-3">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider">
                            <i class="fas fa-sun"></i>
                            <i class="fas fa-moon"></i>
                        </div>
                    </label>
                </div>
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm me-2"><i class="fas fa-arrow-left"></i>
                    Back</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <!-- Form Section -->
            <div class="col-lg-6 mb-5">
                <div class="glass-card fade-in">
                    <h2 class="mb-4 text-primary fw-bold">Resume Details</h2>
                    <form id="resumeForm">

                        <!-- Personal Info -->
                        <div class="section-card mb-4">
                            <h4 class="mb-3 border-bottom pb-2">Personal Information</h4>
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" name="fullName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="email" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone</label>
                                    <input type="text" class="form-control" name="phone" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Address</label>
                                    <input type="text" class="form-control" name="address">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">LinkedIn (Optional)</label>
                                    <input type="text" class="form-control" name="linkedin">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Profile Summary</label>
                                    <div id="summary-editor"
                                        style="height: 150px; background: white; border-radius: 0 0 5px 5px;"></div>
                                    <input type="hidden" name="summary" id="summaryInput">
                                </div>
                            </div>
                        </div>

                        <!-- Education -->
                        <div class="section-card mb-4" id="educationSection">
                            <h4 class="mb-3 border-bottom pb-2 d-flex justify-content-between align-items-center">
                                Education
                                <button type="button" class="btn btn-sm btn-outline-primary"
                                    onclick="addEducationField()">+ Add</button>
                            </h4>
                            <div id="educationContainer">
                                <!-- Dynamic Fields -->
                            </div>
                        </div>

                        <!-- Experience -->
                        <div class="section-card mb-4" id="experienceSection">
                            <h4 class="mb-3 border-bottom pb-2 d-flex justify-content-between align-items-center">
                                Experience
                                <button type="button" class="btn btn-sm btn-outline-primary"
                                    onclick="addExperienceField()">+ Add</button>
                            </h4>
                            <div id="experienceContainer">
                                <!-- Dynamic Fields -->
                            </div>
                        </div>

                        <!-- Skills -->
                        <div class="section-card mb-4">
                            <h4 class="mb-3 border-bottom pb-2">Skills</h4>
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" id="skillInput" placeholder="Add a skill...">
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="addSkill()">Add</button>
                            </div>
                            <div id="skillsContainer" class="d-flex flex-wrap gap-2"></div>
                            <input type="hidden" name="skills" id="skillsHidden">
                        </div>

                        <!-- Languages -->
                        <div class="section-card mb-4">
                            <h4 class="mb-3 border-bottom pb-2">Languages</h4>
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" id="langInput" placeholder="Add a language...">
                                <button class="btn btn-outline-secondary" type="button" onclick="addLang()">Add</button>
                            </div>
                            <div id="langContainer" class="d-flex flex-wrap gap-2"></div>
                            <input type="hidden" name="languages" id="langHidden">
                        </div>

                    </form>
                </div>
            </div>

            <!-- Preview & Template Selection Section -->
            <div class="col-lg-6">
                <!-- Template Selection -->
                <div class="glass-card fade-in mb-4">
                    <h4 class="mb-3 text-primary fw-bold">Select Template</h4>
                    <div class="row g-2">
                        <div class="col-3">
                            <div class="template-card p-2 text-center rounded bg-light selected"
                                onclick="selectTemplate('modern', this)">
                                <small class="fw-bold">Modern</small>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="template-card p-2 text-center rounded bg-light"
                                onclick="selectTemplate('simple', this)">
                                <small class="fw-bold">Simple</small>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="template-card p-2 text-center rounded bg-light"
                                onclick="selectTemplate('creative', this)">
                                <small class="fw-bold">Creative</small>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="template-card p-2 text-center rounded bg-light"
                                onclick="selectTemplate('elegant', this)">
                                <small class="fw-bold">Elegant</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Live Preview -->
                <div class="sticky-top" style="top: 100px; z-index: 10;">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Live Preview</h5>
                            <div>
                                <button class="btn btn-sm btn-light" onclick="updatePreview()">Refresh</button>
                            </div>
                        </div>
                        <div class="card-body p-0 overflow-auto bg-secondary" style="height: 600px;">
                            <div id="resumePreview" class="transform-origin-top-left p-3">
                                <!-- Preview renders here -->
                            </div>
                        </div>
                        <div class="card-footer bg-white d-flex justify-content-between">
                            <button class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
                            <button class="btn btn-success" onclick="saveResume()">Save Resume</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/templates.js"></script>
    <!-- Quill.js JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="js/resume-builder.js"></script>
    <script>
        auth.checkAuth();
    </script>
</body>

</html>
