<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ResumeCraft</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
</head>

<body>

    <!-- Animated Background -->
    <div class="area">
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" style="display: flex; align-items: center;">
                <img src="img/logo4.png" alt="Logo" style="height: 40px; margin-right: 10px;">
                ResumeCraft
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <div class="theme-switch-wrapper">
                            <label class="theme-switch" for="checkbox">
                                <input type="checkbox" id="checkbox" />
                                <div class="slider">
                                    <i class="fas fa-sun"></i>
                                    <i class="fas fa-moon"></i>
                                </div>
                            </label>
                        </div>
                    </li>
                    <li class="nav-item me-3 d-flex align-items-center">
                        <img id="navProfileImg" src="" alt="Profile" class="rounded-circle me-2 d-none"
                            style="width: 35px; height: 35px; object-fit: cover; border: 2px solid var(--primary-color);">
                        <span class="nav-link fw-medium" id="welcomeMsg" style="color: var(--text-color);">Welcome,
                            User</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-danger btn-sm rounded-pill px-3" id="logoutBtn">
                            <i class="fas fa-sign-out-alt me-1"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <div class="glass-card fade-in">
            <div class="row text-center mb-5">
                <div class="col-12">
                    <h1 class="display-4 fw-bold text-primary mb-3">Build Your Professional Resume</h1>
                    <p class="lead text-muted">Choose an option below to get started</p>
                </div>
            </div>

            <div class="row g-4 justify-content-center">
                <!-- Create Resume Card -->
                <div class="col-md-5 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm hover-card bg-transparent">
                        <div class="card-body text-center p-5 cursor-pointer action-card"
                            onclick="window.location.href='create-resume.html'">
                            <div class="mb-4">
                                <i class="fas fa-plus-circle fa-4x text-primary"></i>
                            </div>
                            <h3 class="card-title fw-bold">Create New Resume</h3>
                            <p class="card-text text-muted">Start from scratch with our easy-to-use builder and
                                professional templates.</p>
                            <button class="btn btn-primary-custom rounded-pill px-4 mt-3">Start Creating</button>
                        </div>
                    </div>
                </div>

                <!-- View Resumes Card -->
                <div class="col-md-5 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm hover-card bg-transparent">
                        <div class="card-body text-center p-5 cursor-pointer action-card"
                            onclick="window.location.href='view-resumes.html'">
                            <div class="mb-4">
                                <i class="fas fa-layer-group fa-4x text-secondary"></i>
                            </div>
                            <h3 class="card-title fw-bold">My Resumes</h3>
                            <p class="card-text text-muted">View, edit, download or delete your previously created
                                resumes.</p>
                            <button class="btn btn-outline-primary rounded-pill px-4 mt-3">View Collection</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Inline check for this page specifically to ensure UI updates immediately
        document.addEventListener('DOMContentLoaded', () => {
            auth.checkAuth();
            const user = auth.getCurrentUser();
            if (user) {
                document.getElementById('welcomeMsg').textContent = `Welcome, ${user.fullName}`;
                if (user.profileImage) {
                    const img = document.getElementById('navProfileImg');
                    img.src = user.profileImage;
                    img.classList.remove('d-none');
                }
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                auth.logout();
            });
        });
    </script>

    <style>
        .hover-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: rgba(255, 255, 255, 0.6) !important;
            border-radius: 15px;
        }

        .hover-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1) !important;
            background: rgba(255, 255, 255, 0.9) !important;
        }

        .action-card {
            cursor: pointer;
        }
    </style>
</body>

</html>
