<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Resume - ResumeCraft</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
    <!-- Custom CSS (Only for UI controls, not for resume itself which has inline styles from templates) -->
    <style>
        body {
            background-color: #525659;
            min-height: 100vh;
        }

        .toolbar {
            background-color: #323639;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .preview-container {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            padding-bottom: 50px;
        }

        .paper {
            background: white;
            width: 210mm;
            min-height: 297mm;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            /* padding: 0; Template handles padding */
            box-sizing: border-box;
        }

        @media print {
            .toolbar {
                display: none;
            }

            body {
                background: white;
            }

            .preview-container {
                margin: 0;
                padding: 0;
            }

            .paper {
                box-shadow: none;
                width: 100%;
                min-height: auto;
            }
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <div class="d-flex align-items-center">
            <a href="view-resumes.html" class="btn btn-outline-light btn-sm me-3"><i class="fas fa-arrow-left"></i>
                Back</a>
            <h5 class="m-0">Resume Preview</h5>
        </div>
        <div>
            <button class="btn btn-primary btn-sm me-2" onclick="window.print()">
                <i class="fas fa-download"></i> Download / Print PDF
            </button>
            <button class="btn btn-secondary btn-sm" onclick="editCurrentResume()">
                <i class="fas fa-edit"></i> Edit
            </button>
        </div>
    </div>

    <div class="preview-container">
        <div id="resumeContent" class="paper">
            <!-- Resume renders here -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/templates.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        auth.checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            window.location.href = 'view-resumes.html';
        }

        const resume = app.getResume(id);

        if (resume) {
            const html = TemplateUtils.render(resume.template, resume);
            document.getElementById('resumeContent').innerHTML = html;
        } else {
            Swal.fire('Error', 'Resume not found', 'error').then(() => window.location.href = 'view-resumes.html');
        }

        function editCurrentResume() {
            window.location.href = `create-resume.html?id=${id}`;
        }
    </script>
</body>

</html>
