<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resumes - ResumeCraft</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
</head>

<body>

    <!-- Animated Background -->
    <div class="area">
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" style="display: flex; align-items: center;">
                <img src="img/logo4.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                ResumeCraft
            </a>
            <div class="d-flex align-items-center">
                <div class="theme-switch-wrapper me-3">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider">
                            <i class="fas fa-sun"></i>
                            <i class="fas fa-moon"></i>
                        </div>
                    </label>
                </div>
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm me-2"><i class="fas fa-arrow-left"></i>
                    Dashboard</a>
                <a href="create-resume.html" class="btn btn-primary-custom btn-sm"><i class="fas fa-plus"></i> New
                    Resume</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="glass-card fade-in">
            <h2 class="mb-4 text-primary fw-bold text-center">My Resumes</h2>

            <div id="resumesGrid" class="row g-4 justify-content-center">
                <!-- Resumes will be loaded here -->
            </div>

            <div id="noResumesMsg" class="text-center d-none">
                <p class="lead text-muted">You haven't created any resumes yet.</p>
                <a href="create-resume.html" class="btn btn-primary-custom">Create Your First Resume</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/view-resumes.js"></script>
    <script>
        auth.checkAuth();
    </script>
</body>

</html>
